name: CMake

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest

    steps:
    - name: install Linux deps
      run: |
          sudo apt-get update
          sudo apt-get install -y libsnappy-dev zlib1g-dev libssl-dev cmake gperf ccache
          
    - uses: actions/checkout@v2
      with:
        submodules: recursive
    
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1

    - name: Build
      # Build your program with the given configuration
      uses: lukka/run-cmake@v3
      with:
          cmakeListsOrSettingsJson: CMakeListsTxtAdvanced
          cmakeListsTxtPath: '${{ github.workspace }}/CMakeLists.txt'
          cmakeAppendedArgs: '-DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -D CMAKE_C_COMPILER_LAUNCHER=ccache -D CMAKE_CXX_COMPILER_LAUNCHER=ccache'
          buildWithCMake: true
          buildWithCMakeArgs: '--target install/strip'
          buildDirectory: '${{ github.workspace }}/build'
          
    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v2.3.1
      with:
        name: telegram-bot-api
        path: ${{ github.workspace }}/build/telegram-bot-api
        
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.run_id }}
        release_name: Release ${{ github.run_id }}-${{ github.run_number }}
        draft: false
        prerelease: false
        
    - name: Upload Release Asset
      id: upload-release-asset 
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.create_release.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/build/telegram-bot-api'
        asset_name: telegram-bot-api
        asset_content_type: application/octet-stream
      
